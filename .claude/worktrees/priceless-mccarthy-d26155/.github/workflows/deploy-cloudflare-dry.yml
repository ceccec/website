# Full Cloudflare dry-run (OpenNext build + wrangler deploy --dry-run). Heavy — manual trigger only (not every PR).
name: deploy-cloudflare-dry

on:
  workflow_dispatch:

concurrency:
  group: deploy-cloudflare-dry-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cloudflare-full-dry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify Payload wiring
        run: pnpm run verify:wiring

      - name: Cloudflare deploy dry-run (OpenNext + wrangler)
        env:
          PAYLOAD_HOSTING: cloudflare
          SKIP_DATABASE_MIGRATE: '1'
          SKIP_NEXT_TAG_CACHE_MIGRATIONS: '1'
          SKIP_D1_PRAGMA: '1'
        run: pnpm run deploy:cloudflare:dry
