# Full offline stack: MongoDB + MinIO (S3) + Mailpit (SMTP) → Next + Payload (Unix socket) → Nginx.
# Conventions (official OCI images only, no SaaS plumbing): docker/CONVENTIONS.md · operator guide: DOCKER.md
# Node listens only on a Unix socket; Nginx terminates HTTP. No Vercel Blob or SendGrid required when using defaults below.
#
# 1. `cp .env.docker.example .env.docker` and set `PAYLOAD_SECRET`.
# 2. Optional: override `MINIO_ROOT_*`, `HTTP_PORT`, `NEXT_PUBLIC_SITE_URL` / `PAYLOAD_PUBLIC_APP_URL` in a project `.env`.
# 3. `docker compose build app` then `docker compose up -d`
# 4. Site: http://localhost:${HTTP_PORT:-8080} · Mail UI: http://127.0.0.1:8025 · MinIO console: http://127.0.0.1:9001
#
# Cloudflare Workers + D1 is unchanged — this stack is the Node path (`PAYLOAD_HOSTING=vercel`).

services:
  mongo:
    image: mongo:7
    container_name: payload-website-mongo
    restart: unless-stopped
    volumes:
      - payload_mongo_data:/data/db
    ports:
      - '127.0.0.1:27018:27017'
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', 'db.adminCommand({ ping: 1 })']
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    networks:
      - payload_net

  minio:
    image: minio/minio:latest
    container_name: payload-website-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-miniochangeme}
    volumes:
      - payload_minio_data:/data
    ports:
      - '127.0.0.1:9001:9001'
    networks:
      - payload_net

  minio-init:
    image: minio/mc:latest
    container_name: payload-website-minio-init
    restart: 'no'
    depends_on:
      - minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-miniochangeme}
    volumes:
      - ./docker/minio/init-bucket.sh:/init-bucket.sh:ro
    entrypoint: ['/bin/sh', '/init-bucket.sh']
    networks:
      - payload_net

  mailpit:
    image: axllent/mailpit:latest
    container_name: payload-website-mailpit
    restart: unless-stopped
    ports:
      - '127.0.0.1:8025:8025'
    networks:
      - payload_net

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:8080}
        NEXT_PUBLIC_LOCAL_DOC_SEARCH: ${NEXT_PUBLIC_LOCAL_DOC_SEARCH:-1}
    image: payload-website-app:local
    restart: unless-stopped
    env_file:
      - path: .env.docker
        required: false
    environment:
      LISTEN_UNIX_SOCKET: /run/payload/next.sock
      MONGODB_URL: mongodb://mongo:27017/payload
      PAYLOAD_HOSTING: vercel
      NODE_ENV: production
      # S3-compatible storage (MinIO) — no BLOB_READ_WRITE_TOKEN
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: payload-media
      S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minio}
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-miniochangeme}
      S3_REGION: us-east-1
      S3_FORCE_PATH_STYLE: 'true'
      # SMTP (Mailpit) — no SendGrid
      SMTP_HOST: mailpit
      SMTP_PORT: '1025'
      SMTP_FROM_EMAIL: noreply@localhost
      SMTP_FROM_NAME: Payload
      # Public URLs used by Payload / Next (browser reaches Nginx on host)
      PAYLOAD_PUBLIC_APP_URL: ${PAYLOAD_PUBLIC_APP_URL:-http://localhost:8080}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:8080}
      # Optional: mount a docs tree (e.g. `- ../payload/docs:/docs/payload:ro`) and set LOCAL_DOC_SEARCH_ROOT=/docs/payload
      LOCAL_DOC_SEARCH_ROOT: ${LOCAL_DOC_SEARCH_ROOT:-}
    volumes:
      - payload_socket:/run/payload
    depends_on:
      mongo:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      mailpit:
        condition: service_started
    networks:
      - payload_net
    healthcheck:
      test: ['CMD-SHELL', 'test -S /run/payload/next.sock']
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 180s

  nginx:
    image: nginx:1.27-alpine
    container_name: payload-website-nginx
    restart: unless-stopped
    ports:
      - '${HTTP_PORT:-8080}:80'
    volumes:
      - payload_socket:/run/payload:rw
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - payload_net
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'wget -q -O- http://127.0.0.1/ >/dev/null 2>&1 || exit 1',
        ]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 15s

volumes:
  payload_mongo_data:
  payload_minio_data:
  payload_socket:

networks:
  payload_net:
    driver: bridge
