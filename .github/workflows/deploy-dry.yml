# Fast deployability checks: vercel.json + install; full `pnpm run deploy:dry` is local/CI heavy.
name: deploy-dry

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: deploy-dry-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  vercel-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate vercel.json
        run: pnpm run deploy:vercel:dry
