# Fast deployability checks: vercel.json + install; full `pnpm run deploy:dry` is local/CI heavy.
name: deploy-dry

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: deploy-dry-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  vercel-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify Payload wiring
        run: pnpm run verify:wiring

      - name: Validate vercel.json
        run: pnpm run deploy:vercel:dry

      - name: Validate Wrangler config + check env types are in sync
        # Regenerate into the committed path and fail if it drifted. `--env-file config/empty.env`
        # makes output deterministic (bindings-only) regardless of local .env/.dev.vars, so this
        # matches what `pnpm generate:types:cloudflare` produces on any machine. Keep them in sync.
        run: |
          pnpm exec wrangler types --env-interface CloudflareEnv --env-file config/empty.env cloudflare-env.d.ts
          git diff --exit-code cloudflare-env.d.ts || {
            echo "::error::cloudflare-env.d.ts is out of sync with wrangler.jsonc — run 'pnpm generate:types:cloudflare' and commit the result."
            exit 1
          }
